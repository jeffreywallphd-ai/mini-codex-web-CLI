<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Codex LAN</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main>
    <h1>Codex LAN</h1>

    <label for="projectSelect">Project</label>
    <select id="projectSelect"></select>

    <label for="promptInput">Prompt</label>
    <textarea id="promptInput" rows="6" placeholder="Enter prompt..."></textarea>

    <div id="creditsBox">Credits Remaining: (unknown)</div>

    <button id="runButton">Run</button>

    <div id="statusBox">Ready.</div>

    <h2>Recent Runs</h2>

    <label for="runSearchInput">Search Runs</label>
    <input
      id="runSearchInput"
      type="text"
      placeholder="Search by project or prompt..."
    />

    <ul id="runsList"></ul>

    <h2>Run Detail</h2>

    <details id="promptCard">
      <summary>Prompt</summary>
      <pre id="promptDetail">No prompt available.</pre>
    </details>

    <details id="stderrCard">
      <summary>Raw stderr</summary>
      <pre id="stderrDetail">(none)</pre>
    </details>

    <pre id="runDetail">No run selected.</pre>
  </main>

  <script src="/app.js"></script>
</body>
</html>
