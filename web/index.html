<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Codex LAN</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main>
    <h1>Codex LAN</h1>
    <p class="page-copy">Small-screen Codex control for trusted LAN use.</p>
    <p id="indexLockHint" class="inline-hint hidden" aria-live="assertive"></p>
    <div class="page-actions">
      <a id="manageFeaturesLink" class="nav-link-button secondary-button" href="/features.html">Manage Features</a>
      <a class="nav-link-button secondary-button" href="/context-bundles.html">Manage Context Bundles</a>
    </div>

    <section class="panel stack-gap">
      <label for="projectSelect">Project</label>
      <select id="projectSelect"></select>

      <label for="baseBranchSelect">Base Branch</label>
      <select id="baseBranchSelect" disabled></select>
      <p id="branchHint" class="inline-hint" aria-live="polite"></p>

      <button id="pullButton" class="secondary-button" type="button">Git Pull Selected Repo</button>

      <label for="executionModeSelect">Execution Mode</label>
      <select id="executionModeSelect">
        <option value="read">Read Mode</option>
        <option value="write">Write Mode</option>
      </select>

      <label for="promptInput">Prompt</label>
      <button id="pasteClipboardButton" class="secondary-button" type="button">Paste from Clipboard</button>
      <textarea id="promptInput" rows="6" placeholder="Enter prompt..."></textarea>

      <label for="contextBundleSelect">Context Bundle (Optional)</label>
      <select id="contextBundleSelect">
        <option value="">No context bundle</option>
      </select>
      <p id="contextBundleHint" class="inline-hint" aria-live="polite">
        Choose one saved bundle to prepend reusable context, or leave unselected.
      </p>
      <div id="contextBundleSummaryCard" class="context-bundle-summary hidden" aria-live="polite">
        <p id="contextBundleSummaryTitle" class="context-bundle-summary__title"></p>
        <p id="contextBundleSummaryGuidance" class="context-bundle-summary__guidance"></p>
        <p id="contextBundleSummaryMeta" class="context-bundle-summary__meta"></p>
      </div>

      <button id="clearStateButton" class="secondary-button" type="button">Clear Saved Form State</button>

      <div id="creditsBox">Credits Remaining: (unknown)</div>

      <div class="page-actions">
        <p id="runTimer" class="run-timer hidden" aria-live="polite"></p>
        <button id="runButton">Run</button>
      </div>
      <p id="runningProjectHint" class="inline-hint" aria-live="polite"></p>
      <div id="statusBox">Ready.</div>
    </section>

    <section class="panel stack-gap">
      <div class="section-heading-row">
        <h2>Recent Runs</h2>
      </div>

      <label for="runSearchInput">Search Runs</label>
      <input
        id="runSearchInput"
        type="text"
        placeholder="Search by project or prompt..."
      />
      <label for="runStatusFilterSelect">Run Status</label>
      <select id="runStatusFilterSelect">
        <option value="active" selected>Active Runs</option>
        <option value="archived">Archived Runs</option>
        <option value="all">All Runs</option>
      </select>

      <ul id="runsList"></ul>
    </section>

    <section id="errorCard" class="panel error-card hidden" aria-live="assertive">
      <h2>Latest Error</h2>
      <pre id="errorCardMessage"></pre>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
